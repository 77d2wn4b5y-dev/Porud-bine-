<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Porudžbine</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Porudžbine</h1>
        <p id="dateTime" class="muted"></p>
      </div>
      <button id="newOrderBtn" class="secondary">Nova</button>
    </header>

    <section class="card customer-card">
      <label for="customerInput">Objekat</label>
      <div class="customer-row">
        <input id="customerInput" list="customerList" autocomplete="off" placeholder="Ukucaj ili izaberi objekat" />
        <datalist id="customerList"></datalist>
      </div>
      <div class="customer-meta">
        <span>Poslednja poseta: <strong id="lastVisit">—</strong></span>
      </div>
      <label for="customerNote">Napomena za objekat</label>
      <textarea id="customerNote" rows="2" placeholder="Npr. prijem robe posle 9h"></textarea>
    </section>

    <section class="card products-card">
      <div class="table-head row-grid">
        <span>Artikal</span>
        <span>Prethodni put</span>
        <span>Danas</span>
      </div>
      <div id="products"></div>
    </section>

    <section class="card history-card">
      <div class="section-title">
        <h2>Prethodne porudžbine</h2>
        <button id="clearHistoryBtn" class="text-button danger">Obriši sve</button>
      </div>
      <div id="history" class="history-list"></div>
    </section>
  </main>

  <div class="sticky-save">
    <div class="save-summary">Ukupno: <strong id="currentTotal">0</strong></div>
    <button id="saveBtn" class="primary">Sačuvaj porudžbinu</button>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
