<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Porudžbine" />
  <title>Porudžbine</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Porudžbine</h1>
        <p id="dateTime" class="muted"></p>
      </div>
      <div class="top-actions">
        <button id="settingsBtn" class="icon-button" aria-label="Podešavanja">⚙️</button>
        <button id="newOrderBtn" class="secondary">Nova</button>
      </div>
    </header>

    <nav class="tabs" aria-label="Glavni meni">
      <button class="tab active" data-tab="order">Nova porudžbina</button>
      <button class="tab" data-tab="history">Istorija</button>
    </nav>

    <section id="orderView" class="view active">
      <section class="card customer-card">
        <label for="customerInput">Objekat / kupac</label>
        <input id="customerInput" list="customerList" autocomplete="off" placeholder="Ukucaj ili izaberi objekat" />
        <datalist id="customerList"></datalist>
        <div class="customer-meta">
          <span>Poslednja porudžbina: <strong id="lastVisit">—</strong></span>
        </div>
        <label for="customerNote">Napomena za objekat</label>
        <textarea id="customerNote" rows="2" placeholder="Npr. prijem robe posle 9h"></textarea>
      </section>

      <section class="card products-card">
        <div class="section-title compact">
          <h2>Artikli</h2>
          <span class="muted small">Enter prelazi na sledeći</span>
        </div>
        <div class="table-head row-grid">
          <span>Artikal</span>
          <span>Prethodno</span>
          <span>Danas</span>
        </div>
        <div id="products"></div>
        <div id="noProducts" class="empty-state hidden">Nema artikala. Dodaj ih u podešavanjima.</div>
      </section>

      <label for="orderNote" class="standalone-label">Napomena uz porudžbinu</label>
      <textarea id="orderNote" class="order-note" rows="3" placeholder="Napomena koja važi samo za ovu porudžbinu"></textarea>
    </section>

    <section id="historyView" class="view">
      <section class="card history-card">
        <div class="section-title">
          <h2>Istorija porudžbina</h2>
          <button id="exportAllBtn" class="text-button">Izvezi CSV</button>
        </div>
        <input id="historySearch" type="search" placeholder="Pretraži objekat ili artikal" />
        <div id="history" class="history-list"></div>
      </section>
    </section>
  </main>

  <div id="saveBar" class="sticky-save">
    <span id="draftStatus" class="save-summary">Nova porudžbina</span>
    <button id="saveBtn" class="primary">Sačuvaj porudžbinu</button>
  </div>

  <dialog id="settingsDialog" class="dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-head">
        <div><h2>Podešavanja</h2><p class="muted">Artikli i podaci</p></div>
        <button class="icon-button" value="cancel" aria-label="Zatvori">✕</button>
      </div>

      <section class="settings-section">
        <h3>Dodaj artikal</h3>
        <div class="inline-form">
          <input id="newProductInput" placeholder="Naziv artikla" />
          <button id="addProductBtn" type="button" class="primary small-button">Dodaj</button>
        </div>
      </section>

      <section class="settings-section">
        <div class="section-title"><h3>Redosled artikala</h3><span class="muted small">↑ ↓ pomeranje</span></div>
        <div id="productSettings" class="settings-list"></div>
      </section>

      <section class="settings-section danger-zone">
        <h3>Rezervna kopija</h3>
        <div class="button-grid">
          <button id="backupBtn" type="button" class="secondary">Preuzmi podatke</button>
          <label class="secondary file-label">Uvezi podatke<input id="restoreInput" type="file" accept="application/json" hidden /></label>
        </div>
        <button id="clearAllBtn" type="button" class="danger-button">Obriši sve podatke</button>
      </section>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
